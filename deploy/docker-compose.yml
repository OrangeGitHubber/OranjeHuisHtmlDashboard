# Run from the repo root: docker compose -f deploy/docker-compose.yml up -d --build
# On unraid: use the Compose Manager plugin, or build the image and add a
# container template pointing at it.
#
# The HA URL + token and all config profiles are stored in the /data volume
# (map it to an appdata path). They are entered ONCE from any browser via the
# setup screen — no per-device configuration and no env vars needed.
services:
  haview:
    image: haview:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: haview
    ports:
      - '8090:80'
    volumes:
      - /mnt/user/appdata/haview:/data
    restart: unless-stopped
