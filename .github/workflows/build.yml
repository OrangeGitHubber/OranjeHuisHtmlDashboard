name: Build

on:
  push:
    # scaling-presets: experimental discrete-preset widget scaling, published
    # under its own image tag (never :latest) so it can run side by side with
    # the real deployment for comparison without touching it. Remove this
    # branch name once the experiment is merged or abandoned.
    branches: [main, scaling-presets]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  publish-image:
    needs: verify
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/scaling-presets')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          # :latest/sha only from main — the experimental branch gets its own
          # fixed tag so it can never overwrite the real deployment's image
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=scaling-presets,enable=${{ github.ref == 'refs/heads/scaling-presets' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
